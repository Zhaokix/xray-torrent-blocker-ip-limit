name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build Linux amd64 binary
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist/iptblocker
          go build -o dist/iptblocker/iptblocker ./cmd/xray-ip-limit/
          cp config.yaml.default dist/iptblocker/
          cp install.sh dist/iptblocker/
          cp iptblocker.service dist/iptblocker/
          cp README.md dist/iptblocker/

      - name: Create tarball
        run: |
          cd dist
          tar -czf iptblocker_linux_amd64.tar.gz iptblocker

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/iptblocker_linux_amd64.tar.gz
